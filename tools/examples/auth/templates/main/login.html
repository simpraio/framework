<section class="login-page" aria-labelledby="login-title">
    <form class="login-form" method="post" action="/login" aria-labelledby="login-title">
        <h1 id="login-title">Login</h1>
        {LOGIN_ERROR}<p class="form-error" role="alert">Invalid username or password.</p>{-LOGIN_ERROR}
        <input type="hidden" name="return" value="{RETURN_TO}">
        <label>
            Username
            <input name="username" value="{USERNAME}" autocomplete="username" required>
        </label>
        <label>
            Password
            <input type="password" name="password" autocomplete="current-password" required>
        </label>
        <button type="submit">Login</button>
    </form>
</section>
